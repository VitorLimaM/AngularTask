<mat-card class="item" *ngIf="task" (dblclick)="editTask()">
  <mat-card-header>
    <mat-card-title>{{ task.title }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <p>{{ task.description }}</p>
  </mat-card-content>

  <mat-card-actions>
    <button
      mat-mini-fab
      color="warn"
      aria-label="Delete task"
      (click)="deleteTask()">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
